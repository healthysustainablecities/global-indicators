name: ghsci
channels:
  - conda-forge
dependencies:
  - python=3.14.*
  - osmnx=2.1.* # OpenStreetMap network retrieval and analysis
  - gdal # GDAL and OGR libraries
  - libgdal-pg # PostgreSQL GDAL extension
  - pandas=2.3.* # pandas 2.3 uses ADBC for reads; SQLAlchemy retained for geopandas/DDL
  - nicegui=3.13.* # web app framework
  - fpdf2=2.8.* # pdf templating
  - sqlalchemy=2.0.* # SQL connectivity with PostgreSQL (geopandas, DDL, writes)
  - fonttools=4.61.* # font manipulation (dependabot patch)
  - jupyterlab=4.5.*, >=4.5.7 # code notebooks / web interface
  - tqdm=4.*, >=4.66.3 # progress bar
  - adbc-driver-postgresql # Apache Arrow PostgreSQL driver (data access w/ Pandas>=2.2.*)
  - pyarrow # Apache Arrow for high-performance data processing
  - openpyxl # Excel file reading
  - babel # language localization
  - cartopy # map plotting
  - contextily # basemaps and map styling
  - ipywidgets # for jupyter lab progress bar
  - geoalchemy2 # Geometry datatype extension for SQL Alchemy
  - rasterio # raster data reading
  - psycopg2 # PostgreSQL connection
  - pyyaml # YAML parsing
  - yamllint # YAML linting
  - uharfbuzz # text shaping for font rendering
  - mistune>=3.2.1 # dependabot patch
  - lxml>=6.1.0 # dependabot patch
  - aiohttp>=3.14.0 # dependabot patch
  - Pygments>=2.20.0 # dependabot patch
  - certifi>=2023.7.22 # SSL certificate verification (docker scout patch)
  - urllib3>=2.6.3 # HTTP request handling (dependabot patch)
  - requests>=2.33.0 # HTTP library (dependabot patch)
  - h11>=0.16.0 # dependabot patch
  - h2>=4.3.0 # dependabot patch
  - setuptools>=78.1.1 # dependabot patch
  - pillow>=12.2.0 # dependabot patch
  - starlette>=1.0.1 # dependabot patch
  - python-socketio>=5.14.0 # dependabot patch
  - nbconvert>=7.17.0 # dependabot patch
  - tornado>=6.5.5 # dependabot patch
  - wheel>=0.46.2 # dependabot patch
  - pip>=26.1 # dependabot patch
  - idna>=3.15 # dependabot patch
  - pip: # python package installer
    - gtfs-lite # GTFS data reading
    - arabic-reshaper # for Arabic and Persian text shaping
    - python-bidi # for bi-directional text support in matplotlib
    - pygeometa # metadata templating tools